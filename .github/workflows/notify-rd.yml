# Notify the metronome_r-d knowledge graph when a PR is merged to main.
#
# On merge, sends a `repository_dispatch` event (type: upstream-merge) to
# tensorlink-ai/metronome_r-d, which runs Claude to fold the change into its
# notes/evidence graph.
#
# Auth: a GitHub App (installed on tensorlink-ai with access to metronome_r-d)
# mints a short-lived token scoped to that repo. The default GITHUB_TOKEN
# cannot write across orgs. Requires two secrets in THIS repo:
#   - RD_APP_ID          : the GitHub App's App ID
#   - RD_APP_PRIVATE_KEY : the App's private key (.pem contents)
name: Notify metronome_r-d

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  dispatch:
    # Only on a real merge, not a closed-without-merge.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Mint a token scoped to metronome_r-d
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RD_APP_ID }}
          private-key: ${{ secrets.RD_APP_PRIVATE_KEY }}
          owner: tensorlink-ai
          repositories: metronome_r-d

      - name: Send repository_dispatch to metronome_r-d
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'tensorlink-ai',
              repo: 'metronome_r-d',
              event_type: 'upstream-merge',
              client_payload: {
                source: context.repo.repo,
                pr: context.payload.pull_request.number,
                title: context.payload.pull_request.title,
                url: context.payload.pull_request.html_url,
                merge_commit: context.payload.pull_request.merge_commit_sha,
              },
            });
