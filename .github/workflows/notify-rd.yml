# Notify the metronome_r-d knowledge graph when a PR is merged to main.
#
# On merge, sends a `repository_dispatch` event (type: upstream-merge) to
# tensorlink-ai/metronome_r-d, which runs Claude to fold the change into its
# notes/evidence graph.
#
# Requires secret RD_DISPATCH_TOKEN: a token that can write to metronome_r-d.
# Because that repo is in a different org, the default GITHUB_TOKEN will NOT
# work. Use either:
#   - a GitHub App installed on both orgs with contents:write, or
#   - a fine-grained PAT scoped to tensorlink-ai/metronome_r-d (contents:write).
name: Notify metronome_r-d

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  dispatch:
    # Only on a real merge, not a closed-without-merge.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Send repository_dispatch to metronome_r-d
        # Skip cleanly when RD_DISPATCH_TOKEN is not configured (e.g. on forks
        # or before the secret is set), instead of failing github-script with
        # "Input required and not supplied: github-token".
        if: env.RD_DISPATCH_TOKEN != ''
        env:
          RD_DISPATCH_TOKEN: ${{ secrets.RD_DISPATCH_TOKEN }}
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.RD_DISPATCH_TOKEN }}
          script: |
            await github.rest.repos.createDispatchEvent({
              owner: 'tensorlink-ai',
              repo: 'metronome_r-d',
              event_type: 'upstream-merge',
              client_payload: {
                source: context.repo.repo,
                pr: context.payload.pull_request.number,
                title: context.payload.pull_request.title,
                url: context.payload.pull_request.html_url,
                merge_commit: context.payload.pull_request.merge_commit_sha,
              },
            });
