# Scheduled scrape of the live source catalog, mirrored to Hippius.
#
# Runs `scraper.py --all` on a schedule and mirrors the dated parquet +
# sources.yaml to the Hippius S3 bucket via src/sources/sync_storage.py — the
# same store the repo already uses (default bucket: tsbench-forge-sources at
# s3.hippius.com), laid out as a drop-in cascade eval-pool relay.
#
# WHY THE PULL-BEFORE-SCRAPE: GitHub-hosted runners are ephemeral and
# src/sources/data/ is gitignored, so nothing persists on the runner between
# runs. The scraper appends+dedupes into data/<id>/<UTC-date>.parquet, which
# assumes the day's file is already on disk. So each run first pulls the
# current day's parquet back from Hippius (`sync_storage.py --download --today`),
# scrapes (appending), then uploads. Without the pull, the second run of a UTC
# day would overwrite that day's object with only its own rows.
#
# RESOLUTION NOTE: a 12h poll captures only ~2 points/day for snapshot sources
# whose timestamp == now() (the 1-min / 5-min feeds in cron.yaml). Sources that
# return a rolling window (NOAA 6-min, hourly candles, daily files) are
# unaffected — dedup on the timestamp backfills the whole window each poll. If
# you need the sub-hourly feeds at native resolution, run cron.yaml on a
# persistent host; keep this workflow as the reliable coarse baseline.
#
# SECRETS (Settings -> Secrets and variables -> Actions):
#
#   Persistence to Hippius (unset -> scrape-only smoke test, nothing persisted):
#     HIPPIUS_S3_ACCESS_KEY   required
#     HIPPIUS_S3_SECRET_KEY   required
#     HIPPIUS_S3_ENDPOINT     optional (default https://s3.hippius.com)
#     HIPPIUS_S3_BUCKET       optional (default tsbench-forge-sources)
#
#   Source API keys — the catalog has ~35+ keyed sources (see .env.example).
#   Put your whole .env (KEY=value lines, exactly the .env.example format) into
#   ONE secret named SCRAPER_ENV; it is sourced before the scrape so every
#   env:VAR header and {ENVVAR} URL key resolves. Adding a source later means
#   editing the secret, not this file. Unset -> only keyless sources succeed
#   (the rest log an auth error to data/<id>/_errors.log and are skipped).

name: Scrape live sources

on:
  schedule:
    # Every 12h at an off-peak minute (01:17 and 13:17 UTC). Change to
    # "17 */6 * * *" for 6h or "17 5 * * *" for once daily.
    - cron: "17 1,13 * * *"
  workflow_dispatch:
    inputs:
      scraper_args:
        description: "Args passed to scraper.py (e.g. --all, --domain energy, --id binance_btcusdt_1m)"
        required: false
        default: "--all"

# Never let two scrape runs overlap — they'd race on the same day's parquet.
# A new run waits for the in-flight one rather than cancelling it.
concurrency:
  group: scrape-data
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      HIPPIUS_S3_ACCESS_KEY: ${{ secrets.HIPPIUS_S3_ACCESS_KEY }}
      HIPPIUS_S3_SECRET_KEY: ${{ secrets.HIPPIUS_S3_SECRET_KEY }}
      HIPPIUS_S3_ENDPOINT: ${{ secrets.HIPPIUS_S3_ENDPOINT }}
      HIPPIUS_S3_BUCKET: ${{ secrets.HIPPIUS_S3_BUCKET }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install httpx pyarrow pyyaml pandas numpy boto3 lxml beautifulsoup4 openpyxl

      - name: Pull today's archive from Hippius (append target)
        if: env.HIPPIUS_S3_ACCESS_KEY != ''
        run: python src/sources/sync_storage.py --download --today

      - name: Scrape sources
        # ~90 sources; transient upstream failures are expected and logged to
        # data/<id>/_errors.log. Don't fail the whole run — still publish what
        # succeeded. A hard failure (network down) shows as a red step.
        continue-on-error: true
        env:
          # The operator's whole .env (all source API keys) as one secret.
          SCRAPER_ENV: ${{ secrets.SCRAPER_ENV }}
        run: |
          if [ -n "$SCRAPER_ENV" ]; then
            printf '%s\n' "$SCRAPER_ENV" > .env
            set -a; . ./.env; set +a
            echo "loaded source credentials from SCRAPER_ENV"
          else
            echo "SCRAPER_ENV not set — only keyless sources will succeed"
          fi
          python src/sources/scraper.py ${{ github.event.inputs.scraper_args || '--all' }}

      - name: Mirror to Hippius
        if: env.HIPPIUS_S3_ACCESS_KEY != ''
        run: python src/sources/sync_storage.py

      - name: Smoke-test notice (no Hippius credentials)
        if: env.HIPPIUS_S3_ACCESS_KEY == ''
        run: |
          echo "HIPPIUS_S3_ACCESS_KEY / HIPPIUS_S3_SECRET_KEY are not set —"
          echo "ran a scrape-only smoke test; nothing was persisted."
          echo "Add those repo secrets to enable the Hippius mirror."

      - name: Upload scrape error logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scrape-errors
          path: src/sources/data/**/_errors.log
          if-no-files-found: ignore
          retention-days: 14
