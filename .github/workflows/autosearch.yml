# Daily source-discovery sweep: propose + vet new catalog sources, open a PR.
#
# The ONLY non-deterministic step is the OpenRouter model call in
# source_discovery.llm.propose (one call per run — no loop). Everything else
# (coverage matrix, vetting, ledger dedup) is deterministic. A human reviews and
# merges the PR — nothing enters sources.yaml automatically (licensing / legal
# sign-off stays human, by the module's design).
#
# COST CONTROL (this is the "don't chew through tokens" part):
#   * The FREE, deterministic `--coverage` check runs first. The paid model call
#     only fires when there are under-target cells (or you force it via dispatch).
#     Once the catalog meets its coverage targets, a daily run costs ZERO tokens.
#   * Hidden reasoning is ON (operator's choice — better proposals, costs a few
#     thousand extra tokens per run). GLM ignores the soft
#     OPENROUTER_REASONING_MAX_TOKENS cap (see source_discovery/llm.py), so token
#     budget alone can't bound its deliberation. Two guards keep it in check:
#     the 64k completion ceiling (room for reasoning AND the answer), and
#     OPENROUTER_DEADLINE — a hard total wall-clock budget on the model call. The
#     socket-level OPENROUTER_TIMEOUT does NOT bound total time (the provider
#     keeps a long generation's connection alive, so a reasoning run sailed past
#     it to this job's 20-min cap once); the deadline is the real stop. On
#     overrun the call fails fast and tomorrow's cron retries. Turning reasoning
#     OFF (OPENROUTER_REASONING_ENABLED: "false") is the last resort, not the
#     first: without reasoning GLM re-proposes already-ledgered hosts that the
#     vet hard-rejects, so a run can finish fast yet surface zero NEW sources.
#   * Set the OPENROUTER_MODEL repo VARIABLE to run a cheaper model on the daily
#     cadence (code default: z-ai/glm-5.2).
#   NOTE: while coverage gaps exist (they do today), a daily run = ~1 model call
#   per day until humans wire accepted proposals into sources.yaml and the gap
#   count falls. The gate saves tokens once coverage is actually met.
#
# REQUIRED: repo secret OPENROUTER_API_KEY.
# REQUIRED (one of the two) for the PR step to work:
#   * repo secret PAT_AUTOSEARCH (also accepted: AUTOSEARCH_PAT, PAT_AUTOSEARH)
#     — a fine-grained PAT scoped to this repo with
#     Contents + Pull requests read/write (preferred: its PRs also trigger CI); or
#   * repo setting "Allow GitHub Actions to create and approve pull requests"
#     (Settings → Actions → General → Workflow permissions).
#   With neither, the proposal branch still pushes, but create-pull-request dies
#   with "GitHub Actions is not permitted to create or approve pull requests"
#   and no PR ever appears — the sweep's output silently rots on the branch.

name: Auto-search sources

on:
  schedule:
    - cron: "0 6 * * *"          # daily 06:00 UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Call the model even if there are no coverage gaps"
        type: boolean
        default: false

permissions:
  contents: write                # commit the proposal branch
  pull-requests: write           # open the review PR

concurrency:
  group: autosearch
  cancel-in-progress: false

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
      # Ceiling, not a spend: billing is per token actually generated. 64k must
      # hold hidden reasoning AND the answer (code default is 8k, doubled once
      # on a length-cut retry) — see the reasoning note in the header.
      OPENROUTER_MAX_TOKENS: "64000"
      # Hard total wall-clock budget for the model call (see the reasoning note in
      # the header). Bounds a runaway reasoning run well under this job's 20-min
      # timeout-minutes so a stuck run fails fast instead of being cancelled.
      OPENROUTER_DEADLINE: "600"
      PYTHONPATH: src
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # stdlib urllib handles the OpenRouter call; the module needs pyyaml
      # (catalog) and numpy (quality.py is imported by the CLI entrypoint).
      - name: Install deps
        run: pip install pyyaml numpy

      - name: Coverage gaps (free, deterministic — no model call)
        id: gaps
        run: |
          n=$(python -m source_discovery --coverage 2>/dev/null \
              | python -c "import sys,json;print(len(json.load(sys.stdin).get('gap_cells',[])))")
          echo "count=$n" >> "$GITHUB_OUTPUT"
          echo "under-target cells: $n"

      - name: No gaps → skip the paid run
        if: steps.gaps.outputs.count == '0' && github.event.inputs.force != 'true'
        run: echo "Catalog meets coverage targets; skipping the model call (0 tokens)."

      - name: Missing API key → warn and skip
        if: >-
          env.OPENROUTER_API_KEY == '' &&
          (steps.gaps.outputs.count != '0' || github.event.inputs.force == 'true')
        run: echo "::warning::OPENROUTER_API_KEY not set — add it as a repo secret to enable discovery."

      - name: Propose + vet (the one model call)
        if: >-
          env.OPENROUTER_API_KEY != '' &&
          (steps.gaps.outputs.count != '0' || github.event.inputs.force == 'true')
        run: |
          python -m source_discovery --out src/sources/discovery/proposals
          echo "### Auto-search run" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          tail -n 20 src/sources/discovery/proposals/candidates.json >> "$GITHUB_STEP_SUMMARY" 2>/dev/null || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # Secrets resolve to "" when absent/misnamed — the token line below then
      # silently falls back to github.token, which this repo forbids from
      # creating PRs. This makes the fallback visible in the run log.
      - name: Which PR token is in play (diagnostic)
        run: |
          echo "PAT_AUTOSEARCH resolves: ${{ secrets.PAT_AUTOSEARCH != '' }}"
          echo "AUTOSEARCH_PAT resolves: ${{ secrets.AUTOSEARCH_PAT != '' }}"
          echo "PAT_AUTOSEARH resolves: ${{ secrets.PAT_AUTOSEARH != '' }}"
          echo "If all are false, the step below runs on github.token: the secret is missing or misnamed under Settings → Secrets and variables → Actions → Repository secrets (a *Variable* or Codespaces/Dependabot/Environment secret will NOT resolve here)."

      - name: Open / update proposals PR
        if: >-
          env.OPENROUTER_API_KEY != '' &&
          (steps.gaps.outputs.count != '0' || github.event.inputs.force == 'true')
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          # Fine-grained PAT (Contents + Pull requests: read/write on this
          # repo). The default github.token can only open PRs if the repo
          # setting "Allow GitHub Actions to create and approve pull requests"
          # is enabled — the PAT sidesteps that, and PRs it opens also trigger
          # CI (github.token-created PRs don't). All three secret spellings are
          # accepted; the last fallback keeps the step runnable without any.
          token: ${{ secrets.PAT_AUTOSEARCH || secrets.AUTOSEARCH_PAT || secrets.PAT_AUTOSEARH || github.token }}
          branch: autosearch/proposals
          base: main
          add-paths: src/sources/discovery/**
          commit-message: "Auto-search: propose + vet new sources"
          title: "Auto-search: new source proposals"
          labels: autosearch
          body: |
            Automated daily source-discovery sweep (`python -m source_discovery`).

            - **Deterministic vetting is done**: `candidates.json` carries a
              `_verdict` (accept / flag / reject) and `_vet_reasons` per proposal.
            - **Human sign-off required** before anything is wired into
              `sources.yaml` (licensing / legal, per the module's design).
            - The proposal **ledger** update is included so tomorrow's run dedups
              against these instead of re-proposing them.

            Review `src/sources/discovery/proposals/` (gap_analysis.md +
            candidates.json) and the `proposal_ledger.json` diff.

      - name: PR creation blocked → say how to unblock it
        if: >-
          failure() && steps.cpr.conclusion == 'failure'
        run: |
          echo "::error::create-pull-request failed. Most likely cause: the repo setting 'Allow GitHub Actions to create and approve pull requests' (Settings → Actions → General → Workflow permissions) is disabled. The proposal branch WAS pushed — open a PR from 'autosearch/proposals' manually, then enable the setting so future runs open it themselves."
