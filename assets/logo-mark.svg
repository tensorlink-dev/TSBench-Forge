<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="TSBench-Forge mark">
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- cream upward trend -->
  <g fill="none" stroke="#F4ECDD" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6,50 30,15 52,44 78,10"/>
    <line x1="78" y1="10" x2="78" y2="86"/>
  </g>
  <!-- orange forge segment (glowing) -->
  <g filter="url(#glow)">
    <line x1="52" y1="44" x2="42" y2="86" stroke="#EC6442" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="42" y1="86" x2="78" y2="86" stroke="#EC6442" stroke-width="5.5" stroke-linecap="round"/>
    <circle cx="42" cy="86" r="7.2" fill="#EC6442"/>
    <circle cx="78" cy="86" r="7.2" fill="#F78C60"/>
  </g>
  <!-- cream nodes -->
  <g fill="#F4ECDD">
    <circle cx="6" cy="50" r="7.2"/>
    <circle cx="30" cy="15" r="7.2"/>
    <circle cx="52" cy="44" r="7.2"/>
    <circle cx="78" cy="10" r="7.2"/>
  </g>
</svg>
