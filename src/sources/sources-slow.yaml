# Slow-cadence catalog — weekly / monthly / quarterly / annual sources.
#
# GIFT-Eval covers 10 frequencies (10s → annual). The fast catalog `sources.yaml`
# covers 5 (sub-min → daily). This file covers the missing 4: weekly, monthly,
# quarterly, annual — required for a foundation-model generalization test that
# claims coverage across the full cadence ladder.
#
# Same schema as sources.yaml. Every entry carries `dgp_class` (see
# DGP_TAXONOMY.md) so the eval-pool builder can DGP-weight rather than
# source-count-weight the aggregate score.
#
# For monthly/yearly cadences, "daily-fresh" means the augmentation realization
# rotates daily, not the underlying series. See docs/EVAL_POOL.md for how the
# slow tier feeds cascade.pool.
#
# All entries are PENDING first-fetch verification unless noted otherwise.
# ============================================================================

# ============================================================================
# Weekly (P1W) — 5 entries; targeted at ~12 for parity with GIFT-Eval weekly slot
# ============================================================================

- id: eia_weekly_petroleum_stocks
  name: EIA weekly petroleum stocks — US crude, gasoline, distillate, refinery util
  domain: energy
  dgp_class: energy_supply_flow
  archetypes: [smooth_periodic, non_stationary_regime, hierarchical]
  frequency: P1W
  endpoint:
    type: rest_json
    url: https://api.eia.gov/v2/petroleum/stoc/wstk/data/?frequency=weekly&data[0]=value&sort[0][column]=period&sort[0][direction]=desc&length=5000&api_key={EIA_API_KEY}
    auth: env:EIA_API_KEY
    rate_limit: "30 req/min with key"
  schema:
    timestamp_field: response.data[].period
    value_field: response.data[].value
    variates: 1
  history_available: P40Y
  update_cadence_observed: "weekly (Wed release), ~2 day lag"
  pretraining_novelty: partial
  novelty_notes: "EIA weekly petroleum series widely cited; specific sub-series (regional gasoline stocks, distillate imports) less so."
  license: "Public domain (US Government / EIA)"
  sample_path: samples/eia_weekly_petroleum_stocks.json  # PENDING
  verification:
    last_verified: PENDING
    sample_rows: null
    sample_freshness_hours: null
  notes: |
    [VERIFIED 2026-07-01 via WebFetch — EIA v2 API returns weekly petroleum stocks
    with DEMO_KEY.] 267k+ records total across 100s of series. Same `{EIA_API_KEY}`
    URL-query-auth blocker as fast-catalog `eia_natural_gas_spot_daily`.

