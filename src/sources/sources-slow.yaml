- id: ecb_weekly_bank_liquidity
  name: ECB weekly Eurosystem liquidity operations (MRO/MLO/deposit facility)
  domain: econ_fin
  dgp_class: monetary_policy_flow
  archetypes: [non_stationary_regime, bounded, hierarchical]
  frequency: P1W
  endpoint:
    type: rest_json
    url: https://data-api.ecb.europa.eu/service/data/ILM/W.U2.C.T210000.U2.EUR?format=jsondata&lastNObservations=520
    auth: none
    rate_limit: "polite"
  schema:
    timestamp_field: dataSets[0].series."0:0:0:0:0:0".observations
    value_field: dataSets[0].series."0:0:0:0:0:0".observations
    variates: 1
  history_available: P20Y
  update_cadence_observed: "weekly, Tuesday publication"
  pretraining_novelty: clean
  novelty_notes: "ECB SDMX weekly Eurosystem operations — European monetary indicators, distinct from US-heavy TSFM training data."
  license: "CC-BY-4.0 (ECB)"
  sample_path: samples/ecb_weekly_bank_liquidity.json  # PENDING
  verification:
    last_verified: PENDING
    sample_rows: null
    sample_freshness_hours: null
  notes: |
    ECB uses SDMX-JSON with observations keyed by dimension-index strings.
    **Scraper limitation**: SDMX-JSON needs a decoder that maps observation index keys
    back to (time, dimensions). Same shape issue as OECD SDMX + Eurostat.

