  pretraining_novelty: partial
  novelty_notes: "CDC ILI is widely used (Flu Prediction Challenge); some contamination expected. HHS-region breakdown less common than national."
  license: "Public domain (US Government)"
  sample_path: samples/cdc_fluview_ili.json  # PENDING
  verification:
    last_verified: PENDING
    sample_rows: null
    sample_freshness_hours: null
  notes: |
    CDC FluView has multiple endpoints; the QuickStats above is the widely-used HHS-region
    panel. If it moves, alternative dataset id at data.cdc.gov: search "FluView".

