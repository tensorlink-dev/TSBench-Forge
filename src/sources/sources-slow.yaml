# ============================================================================
# Yearly (P1Y) — 3 entries; targeted at ~10 for parity with GIFT-Eval annual slot
# ============================================================================

- id: worldbank_wdi_yearly
  name: World Bank WDI — yearly development indicators by country (panel)
  domain: econ_fin
  dgp_class: development_indicator
  archetypes: [smooth_periodic, non_stationary_regime, hierarchical]
  frequency: P1Y
  endpoint:
    type: rest_json
    url: https://api.worldbank.org/v2/country/all/indicator/{INDICATOR_CODE}?format=json&per_page=20000
    auth: none
    rate_limit: "polite"
  panel:
    # OPERATOR ACTION: populate at activation with 100+ *mid-tail* WDI indicators.
    # AVOID top-cited series (NY.GDP.MKTP.CD, SP.POP.TOTL, etc.) — those appear in
    # every TSFM training corpus. Use sub-sectoral GVA, commodity-specific exports,
    # gender-disaggregated indicators, environmental services, etc.
    - {INDICATOR_CODE: "AG.YLD.CREL.KG"}       # Cereal yield (kg per hectare)
    - {INDICATOR_CODE: "EN.ATM.CO2E.PC"}       # CO₂ emissions per capita
    - {INDICATOR_CODE: "SH.STA.SUIC.P5"}       # Suicide mortality rate
    - {INDICATOR_CODE: "SL.TLF.CACT.FE.ZS"}    # Female labor force participation
    - {INDICATOR_CODE: "TBD-EXPAND-TO-150"}
  schema:
    timestamp_field: "[1][].date"              # year integer
    value_field: "[1][].value"
    variates: 1
  history_available: P60Y
  update_cadence_observed: "annually, ~9 month lag"
  pretraining_novelty: partial
  novelty_notes: "World Bank WDI is comprehensive; top-100 indicators contaminate TSFM training. Mid-tail sub-sectoral indicators are clean."
  license: "CC-BY-4.0 (World Bank)"
  sample_path: samples/worldbank_wdi_yearly.json  # PENDING
  verification:
    last_verified: PENDING              # WebFetch timed out during verification; endpoint pattern documented on data.worldbank.org
    sample_rows: null
    sample_freshness_hours: null
  notes: |
    Response is a 2-array: [0]=metadata, [1]=data. Data records have `date` (year string),
    `value` (numeric), `countryiso3code`. 200-country × N-indicator × 60-year panel.
    See DGP_TAXONOMY.md for guidance on picking indicators that hit distinct DGP classes.

