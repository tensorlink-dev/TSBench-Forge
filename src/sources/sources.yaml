- id: amprion_pv_infeed
  name: Amprion control-area photovoltaic infeed (online extrapolation)
  disabled: true
  disabled_reason: >-
    2026-07-08: endpoint recovered & keyless (200) but two generic-scraper gaps block it: URL needs {START}/{END} date tokens AND the CSV data rows carry no per-row timestamp (values only) — they require a row-index->quarter-hour-grid deriver the generic rest_csv parser lacks. Re-enable once the scraper grows a `time_grid` schema (start-token + step) for headerless-time CSVs.
  domain: energy
  dgp_class: generation_mix
  archetypes: [smooth_periodic, non_stationary_regime, bounded]
  frequency: PT15M
  endpoint:
    type: rest_csv
    url: https://www.amprion.net/api/grid-data/items/csv/PV_EINSPEISUNG/{START}/{END}   # {START}/{END} = YYYY-MM-DD; verified live 2026-07-06/2026-07-08
    auth: none
    rate_limit: null
  schema:
    # Payload is ';'-delimited, German decimals (comma), CRLF. Header declares
    # 4 cols (Datum;Uhrzeit;8:00 Uhr Prognose [MW];Online Hochrechnung [MW]) but
    # DATA ROWS contain ONLY the 2 MW value fields (forecast;actual) — NO per-row
    # timestamp. Timestamps are a regular quarter-hour grid: row i = {START}
    # 00:00 CET + i*PT15M (192 rows observed = 2 days x 96 quarter-hours).
    timestamp_field: row_index          # derived: {START}T00:00 Europe/Berlin + row*PT15M
    value_field: "Online Hochrechnung [MW]"   # 2nd ';' field per row = actual online extrapolation, MW
    variates: 1
  history_available: P5Y
  update_cadence_observed: "quarter-hourly; latest day fills through current quarter-hour"
  pretraining_novelty: clean
  novelty_notes: "Amprion /api/grid-data endpoint (Angular rebrush) not in TSFM corpora; per-quarter-hour PV extrapolation for the Amprion control area is not a standard benchmark series."
  license: "Amprion grid data, free to use with attribution (Amprion Grid Data terms)"
  sample_path: samples/amprion_pv_infeed.csv
  verification:
    last_verified: 2026-07-08
    sample_rows: 192
    sample_freshness_hours: 2
  notes: "Column '8:00 Uhr Prognose [MW]' (1st field) is the day-ahead forecast — pair with actual for a noisy_clean_pair. Other data-types at same path: WIND_EINSPEISUNG, VERTIKALE_NETZLAST, ERZEUGUNG. Use fileType 'zip' for multi-year. Scraper must parse German decimal comma and synthesise the quarter-hour timestamp from the URL date range."

