- id: polymarket_btc_history
  name: Polymarket price history (active market — operator-selected)
  disabled: true
  disabled_reason: >-
    2026-07-03: Polymarket geo-blocks Australia, where the scrape host lives —
    clob/gamma-api.polymarket.com refuse connections ("no route to host"), and
    the panel still holds the TBD-FROM-GAMMA-API sentinel. Re-enable only from
    a non-AU scrape host, after populating the panel per the OPERATOR ACTION note.
  domain: econ_fin
  dgp_class: prediction_market
  archetypes: [bounded, non_stationary_regime]
  frequency: PT1H
  endpoint:
    type: rest_json
    url: https://clob.polymarket.com/prices-history?market={MARKET_ID}&interval=1d&fidelity=60
    auth: none
    rate_limit: null
  panel:
    # OPERATOR ACTION: populate this list at activation by enumerating active markets
    # via gamma-api.polymarket.com/markets?closed=false&order=volume&ascending=false
    # and picking 5-10 long-running, high-volume markets (≥6mo to resolution preferred —
    # markets near resolution have degenerate "approaching binary" dynamics that don't
    # generalise to forecasting skill).
    - {MARKET_ID: "TBD-FROM-GAMMA-API"}
  schema:
    timestamp_field: history[].t          # epoch seconds
    value_field: history[].p              # bounded [0,1]
    variates: 1
  history_available: P1Y
  update_cadence_observed: "every ~5 minutes (clob trades)"
  pretraining_novelty: clean
  novelty_notes: "Specific Polymarket conditions; Polymarket history not in LOTSA/Monash/Chronos/TimesFM/Moirai mixes."
  license: "Polymarket ToS — research use ok"
  sample_path: samples/polymarket_btc_history.json
  verification:
    last_verified: PENDING                # was 2026-05-11; original market resolved (June 2026 expiry)
    sample_rows: null
    sample_freshness_hours: null
  notes: |
    [VERIFIED 2026-07-01:] The original entry pinned market id 13915689... ("BTC≥150K by June 2026")
    which **resolved** before today (2026-07-01). Time-bounded Polymarket markets cannot
    be pinned by id long-term — replaced the single hardcoded id with a `{MARKET_ID}` panel
    placeholder so the operator populates active market ids at activation. See gamma-api
    enumeration command in the panel comment above. Other candidate market ids previously
    documented in candidates.md may also be resolved by now.

