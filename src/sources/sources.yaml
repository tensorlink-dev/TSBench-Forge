  name: AEMO NEMWeb market notices (directory of notice files)
  disabled: true
  disabled_reason: >-
    2026-07-08: https://nemweb.com.au/Reports/Current/Market_Notice/ is keyless & fresh (2026-07-07) but is an HTML directory index of .txt files, not a table — html_table parser yields 0 rows. Needs a directory-listing fetcher (enumerate + fetch each notice). Endpoint preserved for that work.
  domain: energy
  dgp_class: alert_stream
  archetypes: [count_discrete, zero_inflated_sparse]
  frequency: PT30M
  endpoint:
    type: html_table       # BLOCKED — this is an HTML directory index, needs a directory/listing fetcher (none yet; html_table fetcher unsupported)
    url: https://nemweb.com.au/Reports/Current/Market_Notice/
    auth: none
    rate_limit: null
  schema:
    # Directory index lists one file per notice: NEMITWEB1_MKTNOTICE_YYYYMMDD.R<id>.
    # Each file is plain text ("Creation Date : DD/MM/YYYY HH:MM:SS", "Notice ID : <n>").
    # No JSON/CSV table — value is a poll-window notice count (event stream).
    timestamp_field: file_date          # YYYYMMDD parsed from filename (or 'Creation Date' inside the file)
    value_field: item_count             # scraper counts new notice files per poll window
    variates: 1
  history_available: P1Y
  update_cadence_observed: "new notice files appear intraday; directory 'Current' holds ~1 year, latest file dated 2026-07-07 (fresh)"
  pretraining_novelty: clean
  novelty_notes: "AEMO market-notice arrival stream is not a packaged TSFM series."
  license: "AEMO NEMWeb — public data, free to use per AEMO terms"
  sample_path: samples/aemo_market_notices.txt
  verification:
    last_verified: 2026-07-08
    sample_rows: 60
    sample_freshness_hours: 8
  notes: "Endpoint is live+keyless (HTTP 200) but is an HTML directory index, not a table — current scrapers cannot consume it (same gap as html_table). Needs a directory-listing fetcher: enumerate hrefs, parse YYYYMMDD from filename for the timestamp, aggregate to per-hour/day notice counts. No keyless JSON market-notice report exists on visualisations.aemo.com.au (only price/summary reports)."

# ---- b4_health ----
- id: vaers_vaccine_adverse_events
  name: openFDA FAERS drug adverse-event reports — daily report counts (VAERS-style surveillance proxy)
  domain: healthcare
  dgp_class: adverse_event_reports
  archetypes: [count_discrete, non_stationary_regime, noisy_clean_pair]
  frequency: P1D
  endpoint:
    type: rest_json
    url: https://api.fda.gov/drug/event.json?search=receiptdate:%5B20260101+TO+20261231%5D&count=receiptdate
    auth: none
    rate_limit: "240 req/min, 1000/day per IP without key; higher with free key"
  schema:
    timestamp_field: results[].time      # YYYYMMDD date string (report receipt date)
    value_field: results[].count         # number of adverse-event reports received that day
    variates: 1
  history_available: P20Y
  update_cadence_observed: "quarterly bulk refresh (last_updated field); daily granularity within each refresh"
  pretraining_novelty: partial
  novelty_notes: "openFDA endpoint is public but per-day FAERS report-count series is rarely in TSFM corpora; strong day-of-week + reporting-lag structure."
  license: "Public domain / openFDA terms (open.fda.gov/terms)"
  sample_path: samples/vaers_vaccine_adverse_events.json
  verification:
    last_verified: 2026-07-08
    sample_rows: 365
    sample_freshness_hours: 1680
  notes: "True VAERS is ZIP-only (no live per-date API); this uses openFDA FAERS drug/event count=receiptdate as the keyless queryable adverse-event surveillance proxy. Widen the receiptdate range in the URL to extend history. Data lags ~10 weeks (last_updated 2026-04-28). For a device-event variant use api.fda.gov/device/event.json?count=date_received."

- id: pubmed_ncbi_publication_counts
  name: PubMed / NCBI E-utilities — new publications indexed per day
  domain: healthcare
  dgp_class: publication_counts
  archetypes: [count_discrete, non_stationary_regime, smooth_periodic]
  frequency: P1D
  endpoint:
    type: rest_json
    url: https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=all%5Bsb%5D&datetype=edat&reldate=1&retmode=json&retmax=0
    auth: none
    rate_limit: "3 req/sec without API key, 10/sec with free key"
  schema:
    timestamp_field: now()               # snapshot: count of records added in the trailing reldate window at poll time
    value_field: esearchresult.count     # string integer — records added to PubMed in last day
    variates: 1
  history_available: P1D
  update_cadence_observed: "poll daily; reldate=1 returns count of records with Entry Date in the last 24h (~9000/day, strong weekday cycle)"
  pretraining_novelty: clean
  novelty_notes: "Daily PubMed indexing-throughput series is not a published dataset; must be polled forward. Substitute a disease term (e.g. term=covid-19) for a topic-specific count."
  license: "Public domain (NLM); E-utilities usage policy applies"
  sample_path: samples/pubmed_ncbi_publication_counts.json
  verification:
    last_verified: 2026-07-08
    sample_rows: 1
    sample_freshness_hours: 0.1
  notes: "For a reconstructable historical series query fixed one-day windows: &datetype=pdat&mindate=YYYY/MM/DD&maxdate=YYYY/MM/DD (verified, returns esearchresult.count per day). Snapshot semantics here because reldate is relative to poll time."

