- id: ripe_atlas_rootserver_ping
  name: RIPE Atlas built-in root-server ping RTT (6 msm x anchor pairs)
  domain: web_cloudops
  dgp_class: observability_metric
  archetypes: [non_stationary_regime, noisy_clean_pair, hierarchical]
  frequency: PT4M
  endpoint:
    type: rest_json
    url: https://atlas.ripe.net/api/v2/measurements/{MSM_ID}/results/?start={YYYY-MM-DD-1d}&probe_ids={PROBE}
    auth: none
    rate_limit: "public data keyless; be polite — 6 small requests per poll"
  panel:
    # Built-in (Ongoing since 2010-2013) IPv4 ping measurements to DNS root
    # servers, each pinned to one long-lived RIPE Atlas *anchor* probe so a
    # panel row is a single coherent vantage-point series. 240s native step.
    - {MSM_ID: "1001", PROBE: "6307"}   # k.root-servers.net <- NL anchor (AS3333, RIPE NCC)
    - {MSM_ID: "1004", PROBE: "6251"}   # f.root-servers.net <- FI anchor
    - {MSM_ID: "1006", PROBE: "6317"}   # m.root-servers.net <- CH anchor
    - {MSM_ID: "1008", PROBE: "6307"}   # l.root-servers.net <- NL anchor
    - {MSM_ID: "1009", PROBE: "6313"}   # a.root-servers.net <- DE anchor
    - {MSM_ID: "1010", PROBE: "6316"}   # b.root-servers.net <- IT anchor
  schema:
    timestamp_field: "[].timestamp"       # epoch seconds
    value_field: ["[].avg", "[].min", "[].max"]   # RTT ms (3-packet ping); min = propagation floor, avg = noisy
    variates: 3
  history_available: P15Y     # built-ins run since 2010; /results/?start=&stop= pages the full archive
  update_cadence_observed: "240 s per probe; ~500 results/day per pair, fresh to <5 min"
  pretraining_novelty: clean
  novelty_notes: "Per-probe RIPE Atlas RTT series absent from LOTSA/Monash/M4/GIFT-Eval mixes; closest public analogue is Datadog BOOM (different DGP: vendor telemetry, not active probing)."
  license: "RIPE Atlas T&C — open data, free for scientific/statistical use; commercial use needs RIPE NCC permission (not a CC license)"
  sample_path: samples/ripe_atlas_rootserver_ping.json
  verification:
    last_verified: 2026-07-10T10:37:23Z
    sample_rows: 509
    sample_freshness_hours: 0.1
  notes: >
    1-day rolling window refetched each poll; cross-day overlap deduped by the
    existing timestamp dedupe. Failed pings arrive as avg=-1 sentinel (rare) —
    treat as missing downstream. If an anchor retires, swap its PROBE id
    (anchors: /api/v2/probes/?is_anchor=true&status_name=Connected).
    Other roots available: 1005 i, 1011 c, 1012 d, 1013 e, 1016 j.

