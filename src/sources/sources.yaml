- id: celestrak_satellite_tle
  name: CelesTrak — ISS (NORAD 25544) orbital mean motion from GP/TLE
  domain: nature
  dgp_class: orbital_elements
  archetypes: [non_stationary_regime, smooth_periodic]
  frequency: P1D
  endpoint:
    type: rest_json
    url: https://celestrak.org/NORAD/elements/gp.php?CATNR=25544&FORMAT=json
    auth: none
    rate_limit: "CelesTrak asks clients to cache and not poll faster than a few times/day"
  schema:
    timestamp_field: "[].EPOCH"        # ISO UTC element-set epoch, e.g. 2026-07-07T04:27:30.183264
    value_field: "[].MEAN_MOTION"      # revolutions per day (orbits/day); slowly rises as the orbit decays
    variates: 1
  history_available: P0D               # each fetch is the latest element set; series is built by polling over time
  update_cadence_observed: "element set updated a few times per day; single-object array returned"
  pretraining_novelty: clean
