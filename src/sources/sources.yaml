  verification:
    last_verified: 2026-07-10T10:45:00Z
    sample_rows: 1
    sample_freshness_hours: 0.27
  notes: |
    /data/{dataset_id}/{axis} returns the latest observation only ({"time","value"});
    series accrue by polling (PT10M suggested). The parser's snapshot branch yields
    {timestamp=poll time, time=obs time, value=float} — dedupe/downsample on `time`
    downstream. Historical backfill (outside scraper): GET /files?datasets_id={id}&type=json,
    then /files/{file_id}?get=raw -> {"x":[epoch s],"y":[...]} per-day arrays back to each
    station's mindatetime. API spec: https://api.datalakes-eawag.ch/docs. Axis mapping per
    dataset via /datasetparameters?datasets_id={id}. Ephemeral file ids rule out wiring
    the raw daily files directly.
