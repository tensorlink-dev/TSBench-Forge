  schema:
    timestamp_field: ""             # payload {time, value} is a scalar snapshot; empty ts -> poll-time row
    value_field: [time, value]      # time = observation ISO timestamp, value = degC (float)
    variates: 1
  history_available: P1Y            # youngest station 2024-09; LeXPLORE back to 2019; full history via per-day JSON files
  update_cadence_observed: "10-60 min per station (obs 0.2-1.7 h old at verify time)"
  pretraining_novelty: clean
  novelty_notes: "Datalakes per-station Swiss lake temps not in LOTSA/Monash/Chronos/TimesFM/Moirai mixes; LeXPLORE data appears in papers but not as these live series."
  license: "MIT — every panel dataset has licenses_id=6 (MIT) per /selectiontables/licenses; embargo 0"
