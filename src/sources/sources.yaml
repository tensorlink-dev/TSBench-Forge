- id: gharchive_hourly_events
  name: GH Archive per-minute event counts (clean aggregate of GitHub firehose)
  domain: web_cloudops
  dgp_class: code_activity
  archetypes: [count_discrete, smooth_periodic, noisy_clean_pair]
  # The parser emits per-MINUTE counts within each hourly archive file; the
  # series is only contiguous when the cron polls hourly. (Was mislabeled PT1H,
  # which pointed MASE at a wrong season and hid the gap structure.)
  frequency: PT1M
  endpoint:
    # Hourly files are gzipped NDJSON (one event per line), not a JSON document —
    # the dedicated parser regex-extracts created_at and buckets to minute counts.
    type: ndjson_minute_counts
    url: https://data.gharchive.org/{YYYY-MM-DD}-{H-1}.json.gz
    auth: none
    rate_limit: null
  schema:
    timestamp_field: timestamp      # minute bucket, emitted by the parser
    value_field: value              # events in that minute
    variates: 1
  history_available: P12Y
  update_cadence_observed: "hourly file drop (~1 h lag)"
  pretraining_novelty: clean
  novelty_notes: "GH Archive aggregates the GitHub events firehose at hour-buckets. Pairs with github_events_firehose as clean reference."
  license: "MIT (gharchive.org)"
  sample_path: samples/gharchive_per_minute.json
  verification:
    last_verified: PENDING                # was 2026-05-11; original URL had unresolved {H} placeholder
    sample_rows: null
    sample_freshness_hours: null
  notes: |
    [VERIFIED 2026-07-01 + scraper patched:] Original URL `{YYYY-MM-DD}-{H}.json.gz` failed
    with "unresolved placeholders ['H']" because the scraper's `expand_url` only handled
    static date tokens, and there was no `panel:` defining H. Two fixes applied:
      (a) scraper.py extended: `expand_url` now substitutes `{H}` (current UTC hour),
          `{HH}` (zero-padded), and the offset form `{H-N}` (e.g. `{H-1}` = previous hour).
      (b) URL token changed `{H}` → `{H-1}` because gharchive publishes ~30-60 min after
          the hour ends; fetching the *current* hour usually 404s, so target the *previous*
          hour for reliable retrieval.
    Each hourly file is ~30-50 MB compressed. Per-minute counts derived from
    event.created_at within the file. Sister of github_events_firehose (noisy realtime
    sample) — same population, different fidelity.
  paired_with: github_events_firehose

