- id: nyiso_realtime_lmp_zonal
  name: NYISO real-time LMP zonal (5-min)
  domain: energy
  dgp_class: energy_price
  archetypes: [hierarchical, non_stationary_regime]
  frequency: PT5M
  endpoint:
    type: rest_csv
    # YYYYMMDD token is expanded to current UTC date by scraper.expand_url.
    # Note: NYISO file rolls at 00:00 ET; for the first ~5h of UTC each day,
    # the previous-day file is still the live one. Production cron should poll
    # the NY-local current-day file.
    url: http://mis.nyiso.com/public/csv/realtime/{YYYYMMDD}realtime_zone.csv
    auth: none
    rate_limit: null
  schema:
    timestamp_field: "Time Stamp"
    value_field: "LBMP ($/MWHr)"
    variates: 1
  history_available: P15Y
  update_cadence_observed: "5 minutes; daily file rolls at 00:00 ET"
  pretraining_novelty: clean
  novelty_notes: "NYISO public file; novel for TSFM."
  license: "NYISO public data"
