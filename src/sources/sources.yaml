  verification:
    last_verified: 2026-05-11T01:29:00Z
    sample_rows: 100
    sample_freshness_hours: 0.5
  notes: "Daily CSV file URL pattern with date. 11 zones per timestamp (CAPITL, CENTRL, etc.) — naturally hierarchical."

