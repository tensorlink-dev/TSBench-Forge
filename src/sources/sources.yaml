- id: openaq_global_air_quality
  name: OpenAQ — global air-quality measurements (multi-station hourly panel)
  domain: healthcare
  dgp_class: air_quality
  archetypes: [hierarchical, noisy_clean_pair, non_stationary_regime, bounded]
  frequency: PT1H
  endpoint:
    type: rest_json
    # v3 has no top-level /measurements — series hang off /v3/sensors/{id}/.
    # The /hours rollup endpoint is empty or times out for many live sensors,
    # so use raw /measurements with a 14-day window (~350 hourly rows, fits
    # one page at limit=1000; pagination is oldest-first within the window).
    url: https://api.openaq.org/v3/sensors/{SENSOR_ID}/measurements?datetime_from={YYYY-MM-DD-14d}&limit=1000
    auth: env:OPENAQ_API_KEY
    rate_limit: "60 req/min with free key"
  panel:
    # PM2.5 sensor ids (parameter id 2), discovered 2026-07-03 via
    # /v3/locations?parameters_id=2&coordinates=...&monitor=true, then verified
    # *sensor-level* datetimeLast < 2 days — location-level datetimeLast lies
    # (a location can be fresh while its pm25 sensor died years ago).
    - {SENSOR_ID: "12234787"}   # Delhi — R K Puram, DPCC (location 17)
    - {SENSOR_ID: "12915957"}   # London — Tower Hamlets Mile End Rd (location 151)
    - {SENSOR_ID: "40702"}      # Mexico City — Nezahualcóyotl (location 8000)
    - {SENSOR_ID: "25551"}      # Los Angeles — Compton (location 1948)
    - {SENSOR_ID: "8533919"}    # Seoul — Hongneung-ro (location 2622586)
    - {SENSOR_ID: "26099"}      # Warsaw — ul. Tołstoja (location 6381)
  schema:
    timestamp_field: results[].period.datetimeFrom.utc
    value_field: results[].value
    variates: 1
  history_available: P8Y
  update_cadence_observed: "10-60 minutes per station"
  pretraining_novelty: partial
  novelty_notes: "OpenAQ aggregates regulatory monitors; some city-level PM2.5 in Weather/EPA pretrains."
  license: "CC-BY-4.0 (OpenAQ)"
  sample_path: samples/openaq_global_air_quality.json  # PENDING
  verification:
    last_verified: PENDING
    sample_rows: null
    sample_freshness_hours: null
  notes: |
    [ACTIVATED 2026-07-03 with live key:] panel populated with six PM2.5 sensors across
    four continents, each verified to return fresh rows via
    /v3/sensors/{id}/measurements?datetime_from=. São Paulo / Jakarta / Beijing / Lagos had
    no monitor with a live pm25 sensor within 25 km at discovery time — revisit when
    expanding the panel. OpenAQ v1/v2 retired 2025-01-31; v3 requires X-API-Key. Pair with
    `open_meteo_air_quality` as a noisy-clean pair (regulatory monitor vs CAMS model).
    Free API key signup at openaq.org.

