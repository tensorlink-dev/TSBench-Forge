- id: treasury_yield_curve_daily
  name: US Treasury daily yield curve rates
  domain: econ_fin
  dgp_class: monetary_policy_rate
  archetypes: [non_stationary_regime, hierarchical]
  frequency: P1D
  endpoint:
    type: rest_csv
    url: https://home.treasury.gov/resource-center/data-chart-center/interest-rates/daily-treasury-rates.csv/{YEAR}/all?type=daily_treasury_yield_curve&field_tdr_date_value={YEAR}
    auth: none
    rate_limit: null
  panel_concat: true   # the panel paginates one series by year, not distinct series
  panel:
    # One CSV per calendar year (the /all/all form 403s); ~250 rows each.
    # Add the new year each January.
    - {YEAR: "2016"}
    - {YEAR: "2017"}
    - {YEAR: "2018"}
    - {YEAR: "2019"}
    - {YEAR: "2020"}
    - {YEAR: "2021"}
    - {YEAR: "2022"}
    - {YEAR: "2023"}
    - {YEAR: "2024"}
    - {YEAR: "2025"}
    - {YEAR: "2026"}
  schema:
    timestamp_field: Date
    value_field: ["1 Mo","3 Mo","6 Mo","1 Yr","2 Yr","5 Yr","10 Yr","30 Yr"]
    variates: 14
  history_available: P30Y
  update_cadence_observed: "weekday only — US Treasury business days"
  pretraining_novelty: contaminated
  novelty_notes: "Headline FRED series; in many pretrain corpora."
  license: "Public domain (US Government)"
  sample_path: samples/treasury_yield_curve.csv
  verification:
    last_verified: 2026-05-11T01:23:00Z
    sample_rows: 100
    sample_freshness_hours: 70.0
  notes: "Calibration baseline for econ_fin daily."

